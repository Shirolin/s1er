# Deploy site/ to Cloudflare Pages on push to main.
# Alternative to CF Pages native Git integration.
name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: pages deploy site --project-name s1er --branch main
